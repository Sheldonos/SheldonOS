version: "3.9"

# SheldonOS — Docker Compose v2.0
# FIXED: Replaced unavailable Docker Hub images (paperclipai/paperclip,
#        volcengine/openviking, mirofish/mirofish, percepta/percepta) with
#        local builds. Added Prometheus + Grafana for observability.
#        Aligned env var names between compose and Python runtime.

networks:
  sheldon_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  openviking_data:
  mirofish_data:
  percepta_data:
  prometheus_data:
  grafana_data:

services:

  # ── Databases ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sheldon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sheldon
      POSTGRES_USER: ${POSTGRES_USER:-sheldon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - sheldon_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sheldon}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sheldon_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - sheldon_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: sheldon_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD required}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - sheldon_internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Layer 0: Control Plane ────────────────────────────────────────────────────
  # FIXED: paperclipai/paperclip (404 on Docker Hub) → local build
  paperclip:
    build:
      context: .
      dockerfile: docker/Dockerfile.paperclip
    container_name: sheldon_paperclip
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sheldon}:${POSTGRES_PASSWORD}@postgres:5432/sheldon
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      PAPERCLIP_SECRET_KEY: ${PAPERCLIP_SECRET_KEY:?required}
    volumes:
      - ./core/control_plane/paperclip/org_config.yaml:/app/config/org_config.yaml
    ports:
      - "3100:3100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sheldon_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  openclaw_gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.openclaw
    container_name: sheldon_openclaw
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PAPERCLIP_URL: http://paperclip:3100
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-sheldon}:${POSTGRES_PASSWORD}@postgres:5432/sheldon
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    ports:
      - "3101:3101"
    depends_on:
      paperclip:
        condition: service_healthy
    networks:
      - sheldon_internal

  # ── Layer 2: Cognitive Backbone ───────────────────────────────────────────────
  cognee:
    image: cognee/cognee:latest
    container_name: sheldon_cognee
    restart: unless-stopped
    environment:
      LLM_API_KEY: ${ANTHROPIC_API_KEY:?required}
      LLM_PROVIDER: anthropic
      GRAPH_DATABASE_PROVIDER: neo4j
      GRAPH_DATABASE_URL: bolt://neo4j:7687
      GRAPH_DATABASE_USERNAME: neo4j
      GRAPH_DATABASE_PASSWORD: ${NEO4J_PASSWORD}
      VECTOR_DB_PROVIDER: lancedb
    ports:
      - "8765:8765"
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - sheldon_internal

  # FIXED: volcengine/openviking (404 on Docker Hub) → local build
  openviking:
    build:
      context: .
      dockerfile: docker/Dockerfile.openviking
    container_name: sheldon_openviking
    restart: unless-stopped
    environment:
      OPENVIKING_DB_URL: postgresql://${POSTGRES_USER:-sheldon}:${POSTGRES_PASSWORD}@postgres:5432/sheldon
      OPENVIKING_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      OPENVIKING_EMBEDDING_MODEL: ${OPENVIKING_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - openviking_data:/app/data
    ports:
      - "8766:8766"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sheldon_internal

  # ── Layer 3: Simulation Engine ────────────────────────────────────────────────
  # FIXED: mirofish/mirofish (404 on Docker Hub) → local build
  mirofish:
    build:
      context: .
      dockerfile: docker/Dockerfile.mirofish
    container_name: sheldon_mirofish
    restart: unless-stopped
    environment:
      MIROFISH_DB_URL: postgresql://${POSTGRES_USER:-sheldon}:${POSTGRES_PASSWORD}@postgres:5432/sheldon
      MIROFISH_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      LLM_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - mirofish_data:/app/data
    ports:
      - "8768:8768"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sheldon_internal

  # FIXED: percepta/percepta (404 on Docker Hub) → local build
  percepta:
    build:
      context: .
      dockerfile: docker/Dockerfile.percepta
    container_name: sheldon_percepta
    restart: unless-stopped
    environment:
      PERCEPTA_DB_URL: postgresql://${POSTGRES_USER:-sheldon}:${POSTGRES_PASSWORD}@postgres:5432/sheldon
    volumes:
      - percepta_data:/app/data
    ports:
      - "8767:8767"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sheldon_internal

  # ── Layer 4: Research & Exploit ───────────────────────────────────────────────
  pentagi:
    image: vxcontrol/pentagi:latest
    container_name: sheldon_pentagi
    restart: unless-stopped
    environment:
      PENTAGI_DB_URL: postgresql://${POSTGRES_USER:-sheldon}:${POSTGRES_PASSWORD}@postgres:5432/sheldon
      LLM_API_KEY: ${ANTHROPIC_API_KEY}
      SANDBOX_MODE: nemoclaw
    ports:
      - "8769:8769"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sheldon_internal
    security_opt:
      - no-new-privileges:true

  # ── SheldonOS Orchestrator ────────────────────────────────────────────────────
  sheldon_orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    container_name: sheldon_orchestrator
    restart: unless-stopped
    environment:
      # Control Plane
      PAPERCLIP_URL: http://paperclip:3100
      OPENCLAW_URL: http://openclaw_gateway:3101
      # Cognitive
      COGNEE_API_URL: http://cognee:8765
      OPENVIKING_API_URL: http://openviking:8766
      # Simulation
      MIROFISH_API_URL: http://mirofish:8768
      PERCEPTA_API_URL: http://percepta:8767
      # Research
      PENTAGI_API_URL: http://pentagi:8769
      # External APIs
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?required}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:?required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MANUS_API_KEY: ${MANUS_API_KEY:-}
      # Financial — FIXED: aligned with Python runtime variable names
      AUTOMATON_WALLET_ADDRESS: ${AUTOMATON_WALLET_ADDRESS:-}
      CRYPTO_WALLET_PRIVATE_KEY: ${CRYPTO_WALLET_PRIVATE_KEY:-}
      AUTOMATON_CHAIN_ID: ${AUTOMATON_CHAIN_ID:-137}
      AUTOMATON_MAX_POSITION_USD: ${AUTOMATON_MAX_POSITION_USD:-100}
      AUTOMATON_DAILY_LOSS_LIMIT_USD: ${AUTOMATON_DAILY_LOSS_LIMIT_USD:-500}
      AUTOMATON_CONFIDENCE_THRESHOLD: ${AUTOMATON_CONFIDENCE_THRESHOLD:-0.65}
      # Behavior
      SEEK_INTERVAL_SECONDS: ${SEEK_INTERVAL_SECONDS:-1800}
      OPPORTUNITY_SCORE_THRESHOLD: ${OPPORTUNITY_SCORE_THRESHOLD:-65.0}
      # Persistence
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-sheldon}:${POSTGRES_PASSWORD}@postgres:5432/sheldon
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/4
      # Observability
      PROMETHEUS_PORT: 9091
    volumes:
      - ./data:/app/data
      - /tmp/sheldon_workspace:/tmp/sheldon_workspace
    ports:
      - "9091:9091"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      paperclip:
        condition: service_healthy
      openclaw_gateway:
        condition: service_started
      cognee:
        condition: service_started
    networks:
      - sheldon_internal
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ── Observability Stack (NEW in v2.0) ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: sheldon_prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "9090:9090"
    networks:
      - sheldon_internal

  grafana:
    image: grafana/grafana:latest
    container_name: sheldon_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-sheldon_grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - sheldon_internal
