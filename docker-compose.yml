version: "3.9"

# SheldonOS — Docker Compose
# Starts all required infrastructure services for SheldonOS.
# Run: docker-compose up -d

networks:
  sheldon_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  openviking_data:
  mirofish_data:
  percepta_data:

services:

  # ── Databases ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sheldon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sheldon
      POSTGRES_USER: ${POSTGRES_USER:-sheldon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - sheldon_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sheldon}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sheldon_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - sheldon_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: sheldon_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD required}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - sheldon_internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Layer 0: Control Plane ──────────────────────────────────────────────────
  paperclip:
    image: paperclipai/paperclip:latest
    container_name: sheldon_paperclip
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sheldon}:${POSTGRES_PASSWORD}@postgres:5432/sheldon
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      PAPERCLIP_SECRET_KEY: ${PAPERCLIP_SECRET_KEY:?required}
    volumes:
      - ./core/control_plane/paperclip/org_config.yaml:/app/config/org_config.yaml
    ports:
      - "3100:3100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sheldon_internal

  openclaw_gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.openclaw
    container_name: sheldon_openclaw
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PAPERCLIP_URL: http://paperclip:3100
    ports:
      - "3101:3101"
    depends_on:
      - paperclip
    networks:
      - sheldon_internal

  # ── Layer 2: Cognitive Backbone ─────────────────────────────────────────────
  cognee:
    image: cognee/cognee:latest
    container_name: sheldon_cognee
    restart: unless-stopped
    environment:
      LLM_API_KEY: ${ANTHROPIC_API_KEY:?required}
      LLM_PROVIDER: anthropic
      GRAPH_DATABASE_PROVIDER: neo4j
      GRAPH_DATABASE_URL: bolt://neo4j:7687
      GRAPH_DATABASE_USERNAME: neo4j
      GRAPH_DATABASE_PASSWORD: ${NEO4J_PASSWORD}
      VECTOR_DB_PROVIDER: lancedb
    ports:
      - "8765:8765"
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - sheldon_internal

  openviking:
    image: volcengine/openviking:latest
    container_name: sheldon_openviking
    restart: unless-stopped
    environment:
      OPENVIKING_DB_URL: postgresql://${POSTGRES_USER:-sheldon}:${POSTGRES_PASSWORD}@postgres:5432/sheldon
      OPENVIKING_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      OPENVIKING_EMBEDDING_MODEL: ${OPENVIKING_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - openviking_data:/app/data
    ports:
      - "8766:8766"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sheldon_internal

  # ── Layer 3: Simulation Engine ──────────────────────────────────────────────
  mirofish:
    image: mirofish/mirofish:latest
    container_name: sheldon_mirofish
    restart: unless-stopped
    environment:
      MIROFISH_DB_URL: postgresql://${POSTGRES_USER:-sheldon}:${POSTGRES_PASSWORD}@postgres:5432/sheldon
      MIROFISH_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      LLM_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - mirofish_data:/app/data
    ports:
      - "8768:8768"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sheldon_internal

  percepta:
    image: percepta/percepta:latest
    container_name: sheldon_percepta
    restart: unless-stopped
    environment:
      PERCEPTA_DB_URL: postgresql://${POSTGRES_USER:-sheldon}:${POSTGRES_PASSWORD}@postgres:5432/sheldon
    volumes:
      - percepta_data:/app/data
    ports:
      - "8767:8767"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sheldon_internal

  # ── Layer 4: Research & Exploit ─────────────────────────────────────────────
  pentagi:
    image: vxcontrol/pentagi:latest
    container_name: sheldon_pentagi
    restart: unless-stopped
    environment:
      PENTAGI_DB_URL: postgresql://${POSTGRES_USER:-sheldon}:${POSTGRES_PASSWORD}@postgres:5432/sheldon
      LLM_API_KEY: ${ANTHROPIC_API_KEY}
      SANDBOX_MODE: nemoclaw
    ports:
      - "8769:8769"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sheldon_internal
    # PentAGI runs in a privileged container for network scanning
    # NemoClaw policy is enforced at the application layer
    security_opt:
      - no-new-privileges:true

  # ── SheldonOS Orchestrator ──────────────────────────────────────────────────
  sheldon_orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    container_name: sheldon_orchestrator
    restart: unless-stopped
    environment:
      # Control Plane
      PAPERCLIP_URL: http://paperclip:3100
      OPENCLAW_URL: http://openclaw_gateway:3101
      # Cognitive
      COGNEE_API_URL: http://cognee:8765
      OPENVIKING_API_URL: http://openviking:8766
      # Simulation
      MIROFISH_API_URL: http://mirofish:8768
      PERCEPTA_API_URL: http://percepta:8767
      # Research
      PENTAGI_API_URL: http://pentagi:8769
      # External APIs
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?required}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:?required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MANUS_API_KEY: ${MANUS_API_KEY:-}
      # Financial
      CRYPTO_WALLET_PRIVATE_KEY: ${CRYPTO_WALLET_PRIVATE_KEY:?required}
      MAX_POSITION_SIZE_USD: ${MAX_POSITION_SIZE_USD:-100}
      DAILY_LOSS_LIMIT_USD: ${DAILY_LOSS_LIMIT_USD:-500}
      # Behavior
      SEEK_INTERVAL_SECONDS: ${SEEK_INTERVAL_SECONDS:-1800}
      OPPORTUNITY_SCORE_THRESHOLD: ${OPPORTUNITY_SCORE_THRESHOLD:-65.0}
    volumes:
      - ./:/app
      - /tmp/sheldon_memory:/tmp/sheldon_memory
    depends_on:
      - paperclip
      - openclaw_gateway
      - cognee
      - openviking
      - mirofish
      - percepta
    networks:
      - sheldon_internal
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
