global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "sheldon_orchestrator"
    static_configs:
      - targets: ["sheldon_orchestrator:9091"]
    metrics_path: /metrics

  - job_name: "sheldon_paperclip"
    static_configs:
      - targets: ["sheldon_paperclip:3100"]
    metrics_path: /metrics

  - job_name: "sheldon_openclaw"
    static_configs:
      - targets: ["sheldon_openclaw:3101"]
    metrics_path: /metrics

  - job_name: "postgres"
    static_configs:
      - targets: ["sheldon_postgres:5432"]

  - job_name: "redis"
    static_configs:
      - targets: ["sheldon_redis:6379"]
