# SheldonOS — NemoClaw Sandbox Policy v2.0
# Enforces hardware-level security for all agent execution.
# Based on NVIDIA NemoClaw's Landlock + seccomp reference implementation.
# FIXED v2.0: Removed ptrace contradiction; tightened syscall allowlist.

policy:
  name: "SheldonOS-Default"
  version: "2.0.0"
  enforcement_level: strict   # strict | moderate | permissive

# ─── Filesystem Isolation (Linux Landlock) ────────────────────────────────────
filesystem:
  allowed_read:
    - /home/ubuntu/SheldonOS/data/
    - /home/ubuntu/SheldonOS/config/
    - /tmp/sheldon_workspace/
    - /usr/lib/
    - /usr/share/
  allowed_write:
    - /home/ubuntu/SheldonOS/data/
    - /tmp/sheldon_workspace/
  allowed_execute:
    - /usr/bin/python3
    - /usr/bin/node
    - /usr/local/bin/
  denied:
    - /etc/passwd
    - /etc/shadow
    - /root/
    - /home/ubuntu/.ssh/
    - /home/ubuntu/.gnupg/

# ─── Syscall Filtering (seccomp) ─────────────────────────────────────────────
# Principle of least privilege: only the syscalls required for normal
# Python/Node compute and network I/O are allowed. All others are denied
# by default (seccomp default action: SCMP_ACT_ERRNO).
syscalls:
  allowed:
    # File I/O
    - read
    - write
    - open
    - openat
    - close
    - stat
    - fstat
    - newfstatat
    - lstat
    - access
    - faccessat
    - pread64
    - pwrite64
    - readv
    - writev
    - preadv
    - pwritev
    - lseek
    - dup
    - dup2
    - dup3
    - fcntl
    - flock
    - fsync
    - fdatasync
    - truncate
    - ftruncate
    - getcwd
    - chdir
    - rename
    - renameat
    - renameat2
    - mkdir
    - mkdirat
    - rmdir
    - creat
    - link
    - linkat
    - unlink
    - unlinkat
    - symlink
    - symlinkat
    - readlink
    - readlinkat
    - chmod
    - fchmod
    - fchmodat
    - chown
    - fchown
    - fchownat
    - umask
    - getdents64
    - statfs
    - fstatfs
    - fallocate
    - copy_file_range
    - sendfile
    # Memory management
    - mmap
    - mprotect
    - munmap
    - brk
    - mremap
    - msync
    - mincore
    - madvise
    - mlock
    - munlock
    - mlockall
    - munlockall
    - mlock2
    # Process / thread
    - clone
    - fork
    - vfork
    - execve
    - execveat
    - exit
    - exit_group
    - wait4
    - waitid
    - getpid
    - getppid
    - getpgrp
    - getpgid
    - setpgid
    - getsid
    - setsid
    - gettid
    - getuid
    - getgid
    - geteuid
    - getegid
    - getgroups
    - uname
    - prctl
    - arch_prctl
    - set_tid_address
    - set_robust_list
    - get_robust_list
    - sched_yield
    - sched_getaffinity
    - sched_setaffinity
    - sched_getparam
    - sched_setparam
    - sched_getscheduler
    - sched_setscheduler
    - sched_get_priority_max
    - sched_get_priority_min
    - sched_rr_get_interval
    - nanosleep
    - clock_nanosleep
    - clock_gettime
    - clock_getres
    - gettimeofday
    - times
    - getrusage
    - getrlimit
    - prlimit64
    - sysinfo
    # Signals
    - rt_sigaction
    - rt_sigprocmask
    - rt_sigpending
    - rt_sigtimedwait
    - rt_sigsuspend
    - rt_sigreturn
    - rt_tgsigqueueinfo
    - sigaltstack
    - tgkill
    - tkill
    - kill
    # Networking (outbound only — enforced at network policy layer)
    - socket
    - connect
    - bind
    - listen
    - accept
    - accept4
    - sendto
    - recvfrom
    - sendmsg
    - recvmsg
    - sendmmsg
    - recvmmsg
    - getsockname
    - getpeername
    - getsockopt
    - setsockopt
    - shutdown
    # Pipes / IPC
    - pipe
    - pipe2
    - select
    - pselect6
    - poll
    - ppoll
    - epoll_create
    - epoll_create1
    - epoll_ctl
    - epoll_wait
    - epoll_pwait
    - eventfd
    - eventfd2
    - signalfd
    - signalfd4
    - timerfd_create
    - timerfd_settime
    - timerfd_gettime
    - inotify_init
    - inotify_init1
    - inotify_add_watch
    - inotify_rm_watch
    - splice
    - tee
    - vmsplice
    # Misc
    - ioctl
    - getrandom
    - memfd_create
    - futex
    - io_setup
    - io_destroy
    - io_getevents
    - io_submit
    - io_cancel
    - io_pgetevents
    - rseq
    - seccomp
    - capget
    - getxattr
    - lgetxattr
    - fgetxattr
    - listxattr
    - llistxattr
    - flistxattr
    - setxattr
    - lsetxattr
    - fsetxattr
    - removexattr
    - lremovexattr
    - fremovexattr
    - sync
    - syncfs
    - sync_file_range
    - readahead
    - mknod
    - mknodat
    - umount2
    - statx
    - perf_event_open
    - userfaultfd
    - membarrier
    - pkey_mprotect
    - pkey_alloc
    - pkey_free
    - process_vm_readv
    - process_vm_writev

  # Explicitly deny dangerous syscalls — these are NOT in the allowed list above
  # and are blocked by the seccomp default-deny action, but listed here for clarity.
  denied:
    - ptrace            # Prevent agent from tracing other processes
    - kexec_load        # Prevent kernel replacement
    - kexec_file_load   # Prevent kernel replacement (file variant)
    - reboot            # Prevent system reboot
    - mount             # Prevent filesystem mounting
    - pivot_root        # Prevent root filesystem change
    - init_module       # Prevent kernel module loading
    - finit_module      # Prevent kernel module loading (file variant)
    - delete_module     # Prevent kernel module removal
    - create_module     # Legacy — deny
    - setuid            # Prevent privilege escalation
    - setgid            # Prevent privilege escalation
    - setresuid         # Prevent privilege escalation
    - setresgid         # Prevent privilege escalation
    - setreuid          # Prevent privilege escalation
    - setregid          # Prevent privilege escalation
    - capset            # Prevent capability manipulation
    - iopl              # Prevent I/O port access
    - ioperm            # Prevent I/O port permission change
    - bpf               # Prevent eBPF program loading
    - swapon            # Prevent swap manipulation
    - swapoff           # Prevent swap manipulation
    - acct              # Prevent process accounting
    - settimeofday      # Prevent system clock modification
    - adjtimex          # Prevent system clock modification
    - clock_settime     # Prevent system clock modification
    - sethostname       # Prevent hostname modification
    - setdomainname     # Prevent domain name modification

# ─── Network Policy ───────────────────────────────────────────────────────────
network:
  allowed_outbound:
    - "api.openai.com:443"
    - "api.anthropic.com:443"
    - "api.perplexity.ai:443"
    - "api.telegram.org:443"
    - "hooks.slack.com:443"
    - "api.cognee.ai:443"
    - "polymarket.com:443"
    - "clob.polymarket.com:443"
    - "kalshi.com:443"
    - "trading-api.kalshi.com:443"
    - "github.com:443"
    - "pypi.org:443"
    - "registry.npmjs.org:443"
    - "vercel.com:443"
    - "api.vercel.com:443"
    - "mainnet.infura.io:443"
    - "polygon-mainnet.infura.io:443"
  allowed_internal:
    - "localhost:3100"   # Paperclip
    - "localhost:3101"   # OpenClaw
    - "localhost:5432"   # PostgreSQL
    - "localhost:6379"   # Redis
    - "localhost:7474"   # Neo4j (Cognee)
    - "localhost:8765"   # Cognee API
    - "localhost:8766"   # OpenViking API
    - "localhost:8767"   # Percepta API
    - "localhost:8768"   # MiroFish API
    - "localhost:9090"   # Prometheus metrics
  denied_outbound:
    - "*:22"    # No SSH outbound
    - "*:23"    # No Telnet
    - "*:3389"  # No RDP

# ─── Resource Limits ─────────────────────────────────────────────────────────
resources:
  max_cpu_pct: 80
  max_memory_mb: 8192
  max_disk_write_mb_per_min: 500
  max_network_bandwidth_mbps: 100
  max_subprocess_depth: 5
