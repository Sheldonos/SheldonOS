  # Explicitly deny dangerous syscalls
  denied:
    - ptrace          # Prevent agent from tracing other processes
    - kexec_load      # Prevent kernel replacement
    - reboot          # Prevent system reboot
    - mount           # Prevent filesystem mounting
    - umount2         # Prevent filesystem unmounting

# ─── Network Policy ───────────────────────────────────────────────────────────
network:
  # Agents may only connect to these external endpoints
  allowed_outbound:
    - "api.openai.com:443"
    - "api.anthropic.com:443"
    - "api.perplexity.ai:443"
    - "api.telegram.org:443"
    - "hooks.slack.com:443"
    - "api.cognee.ai:443"
    - "polymarket.com:443"
    - "kalshi.com:443"
    - "github.com:443"
    - "pypi.org:443"
    - "registry.npmjs.org:443"
  # Internal services always allowed
  allowed_internal:
    - "localhost:3100"   # Paperclip
    - "localhost:3101"   # OpenClaw
    - "localhost:5432"   # PostgreSQL
    - "localhost:6379"   # Redis
    - "localhost:7474"   # Neo4j (Cognee)
    - "localhost:8765"   # Cognee API
    - "localhost:8766"   # OpenViking API
    - "localhost:8767"   # Percepta API
    - "localhost:8768"   # MiroFish API
  denied_outbound:
    - "*:22"    # No SSH outbound
    - "*:23"    # No Telnet

# ─── Resource Limits ─────────────────────────────────────────────────────────
resources:
  max_cpu_pct: 80           # Max CPU usage per agent process
  max_memory_mb: 8192       # Max RAM per agent (8 GB)
  max_disk_write_mb_per_min: 500
  max_network_bandwidth_mbps: 100
  max_subprocess_depth: 5   # Prevent infinite recursive spawning
